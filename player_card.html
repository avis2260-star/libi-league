<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>כרטיס שחקן – ליגת ליב"י</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 40px;
      background: #06091a;
      font-family: 'Heebo', 'Arial', sans-serif;
      padding: 40px 20px;
    }

    /* ─── CARD SHELL ──────────────────────────────────────── */
    .player-card {
      position: relative;
      width: 300px;
      border-radius: 18px;
      overflow: hidden;
      direction: rtl;
      box-shadow:
        0 0 0 1px rgba(80, 140, 255, 0.25),
        0 8px 32px rgba(0, 0, 40, 0.7),
        0 24px 64px rgba(0, 0, 80, 0.5);
      background:
        radial-gradient(ellipse 80% 55% at 50% 38%,
          #1e4db7 0%,
          #0e2472 35%,
          #060f3a 65%,
          #020615 100%);
    }

    /* Glass sheen */
    .player-card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 18px;
      background: linear-gradient(
        135deg,
        rgba(255,255,255,0.08) 0%,
        rgba(255,255,255,0.02) 40%,
        transparent 70%
      );
      pointer-events: none;
      z-index: 20;
    }

    /* Rim glow */
    .player-card::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 18px;
      border: 1px solid rgba(120,180,255,0.35);
      pointer-events: none;
      z-index: 21;
    }

    /* ─── CORNER LOGO ─────────────────────────────────────── */
    .card-logo {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 72px;
      height: auto;
      border-radius: 8px;
      z-index: 10;
      filter: drop-shadow(0 2px 8px rgba(0,0,60,0.6));
    }

    /* ─── HEADER ──────────────────────────────────────────── */
    .card-header {
      position: relative;
      z-index: 5;
      padding: 18px 92px 4px 16px;
      text-align: center;
    }

    .league-name {
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 1.5px;
      text-shadow:
        0 0 12px rgba(120,190,255,0.9),
        0 0 28px rgba(80,140,255,0.5);
    }

    .season-label {
      margin-top: 3px;
      font-size: 9px;
      font-weight: 600;
      color: rgba(160,200,255,0.75);
      letter-spacing: 1px;
    }

    .header-rule {
      width: 60%;
      height: 1px;
      margin: 6px auto 0;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(100,160,255,0.5) 30%,
        rgba(100,160,255,0.5) 70%,
        transparent
      );
    }

    /* ─── FLAMING BALL AREA ───────────────────────────────── */
    .central-graphic {
      position: relative;
      z-index: 5;
      width: 100%;
      height: 132px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .central-graphic svg { overflow: visible; }

    /* ─── PLAYER PHOTO ────────────────────────────────────── */
    .photo-wrap {
      position: relative;
      z-index: 5;
      display: flex;
      justify-content: center;
      margin-top: -6px;
    }

    .photo-frame {
      width: 82px;
      height: 88px;
      border-radius: 12px;
      border: 2px solid rgba(100,170,255,0.55);
      background: linear-gradient(160deg, rgba(40,80,180,0.45), rgba(10,20,80,0.55));
      backdrop-filter: blur(6px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      box-shadow:
        0 4px 20px rgba(0,0,60,0.5),
        0 0 12px rgba(60,120,255,0.2) inset;
      overflow: hidden;
    }

    .photo-frame img {
      width: 100%; height: 100%;
      object-fit: cover;
      border-radius: 10px;
    }

    .photo-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }

    .photo-placeholder svg { opacity: 0.55; }

    .photo-hint {
      font-size: 8px;
      color: rgba(160,200,255,0.6);
      text-align: center;
    }

    /* ─── INFO BLOCK ──────────────────────────────────────── */
    .info-block {
      position: relative;
      z-index: 5;
      margin: 12px 16px 0;
      border-radius: 11px;
      border: 1px solid rgba(100,160,255,0.22);
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      padding: 4px 2px;
      overflow: hidden;
    }

    .info-block::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(160deg, rgba(255,255,255,0.06) 0%, transparent 60%);
      pointer-events: none;
    }

    .info-row {
      display: flex;
      align-items: center;
      padding: 7px 14px;
      gap: 8px;
    }

    .info-row + .info-row { border-top: 1px solid rgba(100,160,255,0.1); }

    .info-label {
      font-size: 10.5px;
      font-weight: 700;
      color: rgba(140,190,255,0.85);
      white-space: nowrap;
      min-width: 68px;
      text-align: right;
    }

    .info-value {
      font-size: 11.5px;
      font-weight: 600;
      color: #ffffff;
      flex: 1;
      text-align: right;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .info-value.empty {
      color: rgba(255,255,255,0.25);
      font-weight: 400;
      font-style: italic;
    }

    /* ─── FOOTER ──────────────────────────────────────────── */
    .card-footer {
      position: relative;
      z-index: 5;
      text-align: center;
      padding: 10px 16px 20px;
    }

    .libi-brand {
      font-size: 56px;
      font-weight: 900;
      line-height: 1;
      color: #ffffff;
      letter-spacing: -2px;
      text-shadow:
        0 0 20px rgba(255,100,20,0.55),
        0 0 50px rgba(255,60,0,0.25),
        0 3px 0 rgba(0,0,0,0.6);
    }

    .official-label {
      margin-top: 4px;
      font-size: 8px;
      font-weight: 600;
      color: rgba(160,200,255,0.6);
      letter-spacing: 1px;
    }

    /* ─── DEMO GRID ───────────────────────────────────────── */
    .demo-label {
      width: 100%;
      text-align: center;
      color: rgba(100,140,220,0.7);
      font-family: 'Heebo', sans-serif;
      font-size: 12px;
      letter-spacing: 0.5px;
    }

    .demo-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
  </style>
</head>
